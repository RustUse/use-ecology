[workspace]
release = false
release_always = false
changelog_update = false
pr_labels = ["release"]
max_analyze_commits = 2000

[[package]]
name = "use-ecosystem"
release = true
version_group = "rustuse-ecology"

[[package]]
name = "use-habitat"
